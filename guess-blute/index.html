<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess Blute</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="title-bar">
    <div class="title-bar-top">
    <div class="title-group">
      <span class="title">Guess Blute</span>
      <div class="subtitle-row">
        <span class="score-display" id="scoreDisplay"></span>
        <span class="secret-label" id="secretLabel"></span>
      </div>
    </div>
    <div class="header-actions">
      <button class="final-guess-btn" id="finalGuessBtn" type="button">Guess</button>
      <button class="icon-btn" id="menuBtn" aria-label="Menu" data-tooltip="Menu">
        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M4 6h16" />
          <path d="M4 12h16" />
          <path d="M4 18h16" />
        </svg>
      </button>
    </div>
    </div>
  </header>

  <main class="grid-wrap">
    <div class="grid" id="grid"></div>
  </main>

  <footer class="question-wrap">
    <div class="question-box">
      <form class="question-header" id="questionForm">
        <input
          type="text"
          id="questionInput"
          class="question-live-input"
          placeholder="Ask a question... e.g. Is it wearing glasses?"
          autocomplete="off"
          enterkeyhint="send"
        />
        <span class="blink-cursor" aria-hidden="true"></span>
      </form>
      <div class="question-body">
        <div class="question-feedback" id="questionFeedback"></div>
        <ul class="history-list" id="historyList"></ul>
      </div>
    </div>
  </footer>

  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="leaderboard.js"></script>
  <script src="telemetry.js"></script>
  <script src="blutes-data.js"></script>
  <script src="question-parser.js"></script>
  <script src="script.js"></script>
</body>
</html>
