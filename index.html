<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess Blute</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="title-bar">
    <div class="title-group">
      <span class="title">Guess Blute</span>
      <span class="secret-label" id="secretLabel"></span>
    </div>
    <div class="icon-buttons">
      <!--
      <button class="icon-btn" id="homeBtn" aria-label="Main menu">
        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
          <path d="M12 3l9 8h-3v9h-4v-6h-4v6H5v-9H2z" />
        </svg>
      </button>
      -->
      <button class="icon-btn" id="infoBtn" aria-label="Rules / Info">
        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
          <circle cx="12" cy="7.5" r="1.3" />
          <rect x="10.75" y="10.5" width="2.5" height="7" rx="1" />
        </svg>
      </button>
      <button class="icon-btn" id="statsBtn" aria-label="Stats">
        <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
          <rect x="9" y="2" width="6" height="6" rx="1" />
          <rect x="5.5" y="9" width="6" height="6" rx="1" />
          <rect x="12.5" y="9" width="6" height="6" rx="1" />
          <rect x="2" y="16" width="6" height="6" rx="1" />
          <rect x="9" y="16" width="6" height="6" rx="1" />
          <rect x="16" y="16" width="6" height="6" rx="1" />
        </svg>
      </button>
    </div>
  </header>

  <main class="grid-wrap">
    <div class="grid" id="grid"></div>
  </main>

  <footer class="question-wrap">
    <div class="question-box">
      <div class="question-header">
        <div class="header-col"><span class="header-label">Questions</span></div>
        <div class="header-col"><span class="header-label">History</span></div>
      </div>
      <div class="question-columns">
        <div class="question-col">
          <div class="category-accordion" id="categoryAccordion"></div>
        </div>
        <div class="question-col history-col">
          <ul class="history-list" id="historyList"></ul>
        </div>
      </div>
    </div>
  </footer>

  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="leaderboard.js"></script>
  <script src="blutes-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
