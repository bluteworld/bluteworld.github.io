<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blute World</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      background: #585931;
      font-family: 'Bubblegum Sans', sans-serif;
      color: #E3D0A7;
      padding: 4vmin 4vmin 6vmin;
      text-align: center;
    }

    .title {
      align-self: flex-start;
      text-align: left;
      font-size: clamp(2.5rem, 8vmin, 4rem);
      font-weight: bold;
    }

    .tagline {
      margin-top: 1.5vmin;
      font-size: clamp(1rem, 2.5vmin, 1.3rem);
      color: rgba(227, 208, 167, 0.85);
    }

    .section-header {
      margin-top: 6vmin;
      font-size: clamp(1.3rem, 3.5vmin, 1.8rem);
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .games {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3vmin;
      margin-top: 2.5vmin;
      width: 100%;
      max-width: 900px;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2vmin;
      width: min(70vw, 260px);
      padding: 4vmin 3vmin;
      background: #f0e6c8;
      color: #3a2e1f;
      border-radius: 2vmin;
      text-decoration: none;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .game-card:hover,
    .game-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
    }

    .game-card img {
      width: 40%;
      height: auto;
    }

    .game-name {
      font-size: 1.4rem;
      font-weight: bold;
    }

    .game-desc {
      font-size: 0.9rem;
      color: rgba(58, 46, 31, 0.75);
    }
  </style>
</head>
<body>
  <div class="title">Blute World</div>
  <!-- <p class="tagline">A little world of blute games.</p> -->

  <h2 class="section-header">Games</h2>
  <div class="games">
    <a class="game-card" href="guess-blute/">
      <img src="guess-blute/secret.png" alt="" aria-hidden="true" />
      <span class="game-name">Guess Blute</span>
      <span class="game-desc">A daily guessing game — figure out the secret blute in as few questions as possible.</span>
    </a>
  </div>
</body>
</html>
